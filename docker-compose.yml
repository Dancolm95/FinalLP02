version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: inventory-mysql
    restart: always
    environment:
      MYSQL_DATABASE: inventory_db
      MYSQL_USER: ${DB_USER:-inventory_user}
      MYSQL_PASSWORD: ${DB_PASS:-inventory_pass}
      MYSQL_ROOT_PASSWORD: ${ROOT_PASS:-root_pass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - .env

volumes:
  mysql_data: